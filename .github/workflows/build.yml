# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build

on:
  push:
    branches: &branches
      - main
    paths: &paths
      - modules/**
      - configurations/**
      - overlays/**
      - flake.lock
      - flake.nix
  pull_request:
    paths: *paths
    branches: *branches

jobs:
  discover-configs:
    runs-on: ubuntu-latest
    outputs:
      darwin-configs: ${{ steps.discover.outputs.darwin-configs }}

    steps:
      - name: ⤵️ Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🏗️ Install Nix
        uses: ./.github/actions/setup-nix
        with:
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: 🔍 Discover configurations
        id: discover
        run: |
          darwin_configs=$(nix eval .#darwinConfigurations --apply builtins.attrNames --json 2>/dev/null || echo '[]')
          echo "darwin-configs=$darwin_configs" >> $GITHUB_OUTPUT

  build-macos:
    needs: discover-configs
    if: ${{ fromJSON(needs.discover-configs.outputs.darwin-configs)[0] != null }}
    strategy:
      matrix:
        darwin-config: ${{ fromJSON(needs.discover-configs.outputs.darwin-configs) }}
    runs-on: macos-26
    timeout-minutes: 120

    steps:
      - name: ⤵️ Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🧹 Reclaim disk space for Nix
        uses: wimpysworld/nothing-but-nix@687c797a730352432950c707ab493fcc951818d7 # v10

      - name: 🏗️ Install Nix
        uses: ./.github/actions/setup-nix
        with:
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: 🚀 Build Darwin configuration (${{ matrix.darwin-config }})
        run: >
          nix build .#darwinConfigurations.${{ matrix.darwin-config }}.system
          --no-link --print-build-logs
